<div class="left">

<h2>Student Academic Details</h2>

<input type="text" id="name" placeholder="Enter Student Name">

<input type="number" id="attendance" placeholder="Enter Attendance">

<label>Midterm Score</label>
<input type="number" id="midterm" placeholder="Enter Midterm Score">

<label>Final Exam Score</label>
<input type="number" id="finalscore" placeholder="Enter Final Exam Score">
