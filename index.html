<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Placement Eligibility System</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<header>

<h1><i class="fa-solid fa-user-graduate"></i>
Student Placement Eligibility System</h1>

<p>Machine Learning | Random Forest Classifier</p>

</header>

<div class="container">

<div class="left">

<h2>Student Academic Details</h2>

<input type="text" id="name" placeholder="Student Name">

<input type="number" id="attendance" placeholder="Attendance (%)">

<input type="number" id="midterm" placeholder="Midterm Score">

<input type="number" id="finalscore" placeholder="Final Exam Score">

<input type="number" id="assignment" placeholder="Assignment Average">

<input type="number" id="project" placeholder="Project Score">

<input type="number" id="study" placeholder="Study Hours per Week">

<button onclick="predictPlacement()">

<i class="fa-solid fa-graduation-cap"></i>

Predict Placement

</button>

</div>

<div class="right">

<div id="resultBox" class="result-card">

<div class="icon">

<i class="fa-solid fa-user-check"></i>

</div>

<h2 id="output">Waiting for Prediction</h2>

<p id="message">

Enter student details and click Predict Placement.

</p>

<div class="stats">

<div>

<h3>Confidence</h3>

<p id="confidence">--</p>

</div>

<div>

<h3>Status</h3>

<p id="status">--</p>

</div>

</div>

</div>

</div>

</div>

</body>

<script src="script.js"></script>

</html>
